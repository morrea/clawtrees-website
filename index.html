<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawtrees AI 对话系统</title>
    <!-- 简单样式，让页面不那么简陋 -->
    <style>
        body { max-width: 800px; margin: 20px auto; padding: 0 20px; font-family: Arial; }
        #chat-box { border: 1px solid #ccc; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 20px; }
        #input-box { width: 70%; padding: 10px; }
        #send-btn { padding: 10px 20px; background: #0078d7; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Clawtrees AI 对话</h1>
    <div id="chat-box"></div>
    <input type="text" id="input-box" placeholder="输入你的问题...">
    <button id="send-btn">发送</button>

    <script>
        // 简单的前端交互（后续可对接后端/ Nostr 逻辑）
        const chatBox = document.getElementById('chat-box');
        const inputBox = document.getElementById('input-box');
        const sendBtn = document.getElementById('send-btn');

        // 发送消息逻辑
        sendBtn.onclick = function() {
            const content = inputBox.value.trim();
            if (!content) return;
            
            // 显示用户消息
            chatBox.innerHTML += `<p><strong>你：</strong>${content}</p>`;
            inputBox.value = '';
            
            // 模拟 AI 回复（后续替换为调用后端接口）
            setTimeout(() => {
                chatBox.innerHTML += `<p><strong>AI：</strong>我收到你的消息了：${content}（后续对接后端/Nostr）</p>`;
                chatBox.scrollTop = chatBox.scrollHeight; // 滚动到底部
            }, 500);
        };

        // 按回车发送
        inputBox.onkeydown = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        };
    </script>
</body>
</html>
